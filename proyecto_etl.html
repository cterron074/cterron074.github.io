<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Estadísticas T15 - Proyecto ETL</title>
    <style>
        :root {
            --bg-color: #0a0e13;
            --card-bg: rgba(17, 23, 34, 0.8);
            --accent-blue: #00d2ff;
            --accent-pink: #ff007f;
            --gold: #cdbe91;
            --text-main: #f0e6d2;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 20% 30%, #1a1f2e 0%, #0a0e13 70%);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        /* Estilo de Tarjetas Mejorado */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 30px;
            border-radius: 0; /* Estilo industrial */
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 50px rgba(0,0,0,0.3);
            position: relative;
            margin-bottom: 25px;
        }

        /* Decoración de esquinas tipo Sci-Fi */
        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 10px; height: 10px;
            border-top: 2px solid var(--accent-blue);
            border-left: 2px solid var(--accent-blue);
        }

        h2 {
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.2rem;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(0, 210, 255, 0.2);
            padding-bottom: 10px;
        }

        .stat-box {
            background: linear-gradient(180deg, #161d2b 0%, #0d121c 100%);
            border: 1px solid #253147;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            display: block;
            color: white;
            text-shadow: 0 0 15px var(--accent-blue);
        }

        /* Estilo de etiquetas más sólido */
        .tech-tag {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 5px 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-right: 10px;
            display: inline-block;
        }

        /* Estilos ajustados para el contenedor de datos */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        /* Banner de Títulos */
        .header-banner h1 {
            font-size: 3rem;
            text-shadow: 4px 4px 0px var(--accent-pink), -2px -2px 0px var(--accent-blue);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-banner">
            <h1>PIPELINE ETL: T15</h1>
            <p>Infraestructura de datos de alto rendimiento</p>
        </div>

        <div class="card">
            <h2>Resultados de Análisis</h2>
            <div class="stats-grid">
                <div class="stat-box"><span class="stat-title">Partidas</span><span class="stat-value" id="total-partidas">--</span></div>
                <div class="stat-box"><span class="stat-title">Campeones</span><span class="stat-value" id="total-campeones">--</span></div>
                <div class="stat-box"><span class="stat-title">Minutos</span><span class="stat-value" id="duracion-media">--</span></div>
            </div>
        </div>

        <div class="card">
            <h2>Tecnologías</h2>
            <span class="tech-tag">Python</span>
            <span class="tech-tag">Pandas</span>
            <span class="tech-tag">Flask</span>
            <span class="tech-tag">MySQL</span>
        </div>
    </div>

    <script>
        // Lógica original mantenida
        const API_BASE_URL = 'https://cterron074-github-io.onrender.com/';
        fetch(`${API_BASE_URL}/api/general-stats`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('total-partidas').innerText = data.total_games.toLocaleString();
                document.getElementById('total-campeones').innerText = data.total_champions;
                document.getElementById('duracion-media').innerText = data.avg_duration_minutes;
            })
            .catch(() => console.error("Error cargando datos"));
    </script>
</body>
</html>
