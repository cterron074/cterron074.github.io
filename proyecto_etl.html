<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Estadísticas T15 - Proyecto ETL</title>
    <style>
        :root {
            --bg-color: #0a0e13;
            --card-bg: rgba(17, 23, 34, 0.8);
            --accent-blue: #00d2ff;
            --accent-pink: #ff007f;
            --gold: #f7d85c;
            --text-main: #f7d85c;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 20% 30%, #1a1f2e 0%, #0a0e13 70%);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 30px;
            border-radius: 0;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 50px rgba(0,0,0,0.3);
            position: relative;
            margin-bottom: 25px;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 10px; height: 10px;
            border-top: 2px solid var(--accent-blue);
            border-left: 2px solid var(--accent-blue);
        }

        h2 {
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.2rem;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(0, 210, 255, 0.2);
            padding-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-box {
            background: linear-gradient(180deg, #161d2b 0%, #0d121c 100%);
            border: 1px solid #253147;
            padding: 20px;
            text-align: center;
        }

        .stat-title { display: block; font-size: 0.8rem; color: #8899aa; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 1.8rem; display: block; color: white; text-shadow: 0 0 10px var(--accent-blue); }
        .stat-sub { font-size: 0.8rem; color: var(--gold); }

        .tech-tag {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 5px 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-right: 10px;
            display: inline-block;
        }

        .header-banner h1 { font-size: 3rem; text-shadow: 4px 4px 0px var(--accent-pink), -2px -2px 0px var(--accent-blue); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-banner">
            <h1>PIPELINE ETL: T15</h1>
            <p>Infraestructura de datos de alto rendimiento</p>
        </div>

           
    <div class="card">
            <h2>Resultados de Análisis</h2>
            <div class="stats-grid">
                <div class="stat-box"><span class="stat-title">Partidas</span><span class="stat-value" id="total-partidas">--</span></div>
                <div class="stat-box"><span class="stat-title">Campeones</span><span class="stat-value" id="total-campeones">--</span></div>
                <div class="stat-box"><span class="stat-title">Duración Avg</span><span class="stat-value" id="duracion-media">--</span></div>
                <div class="stat-box"><span class="stat-title">Victorias</span><span class="stat-value" id="victorias-totales">--</span></div>
                <div class="stat-box">
                    <span class="stat-title">Top Campeón</span>
                    <span class="stat-value" id="top-champ">--</span>
                    <span class="stat-sub" id="top-champ-rate">--</span>
                </div>
        
                <div class="stat-box">
                    <span class="stat-title">Top Campeones</span>
                    <ul id="lista-campeones" style="list-style-type: none; padding: 0; font-size: 0.8rem; text-align: center;"></ul>
                </div>
                <div class="stat-box">
                    <span class="stat-title">Win Rate por Rol</span>
                    <ul id="lista-roles" style="list-style-type: none; padding: 0; font-size: 0.8rem; text-align: center; color: #0a9ff0;"></ul>
                </div>
            </div>

           <div>
                <h2>Tecnologías</h2>
                <span class="tech-tag">Python</span>
                <span class="tech-tag">Pandas</span>
                <span class="tech-tag">Flask</span>
                <span class="tech-tag">MySQL</span>
          </div>
    </div>
<script>
    fetch('https://cterron074-github-io.onrender.com/api/stats')
        .then(res => res.json())
        .then(data => {
            // 1. Indicadores simples
            document.getElementById('total-partidas').innerText = data.general.total_games.toLocaleString();
            document.getElementById('total-campeones').innerText = data.general.total_champions;
            document.getElementById('duracion-media').innerText = data.general.avg_duration + " min";
            document.getElementById('victorias-totales').innerText = data.wins.total_wins.toLocaleString();
            document.getElementById('top-champ').innerText = data.best_champ.champion_name;
            document.getElementById('top-champ-rate').innerText = data.best_champ.win_rate + "% WR";

            // 2. Poblar Array Campeones
            const listaChamps = document.getElementById('lista-campeones');
            data.top_champions.forEach(c => {
                const li = document.createElement('li');
                li.innerHTML = `• ${c.champion_name}: <b>${c.games_played}</b>`;
                listaChamps.appendChild(li);
            });

            // 3. Poblar Array Roles
            const listaRoles = document.getElementById('lista-roles');
            data.roles.forEach(r => {
                const li = document.createElement('li');
                li.innerHTML = `• ${r.position}: <b>${r.win_rate}%</b>`;
                listaRoles.appendChild(li);
            });
        })
        .catch(err => console.error("Error cargando datos:", err));
</script>
    
</body>
</html>
