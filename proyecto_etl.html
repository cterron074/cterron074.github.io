<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Estadísticas T15 - Proyecto ETL</title>
    <style>
        :root {
            --bg-color: #0a0e13;
            --card-bg: rgba(17, 23, 34, 0.8);
            --accent-blue: #00d2ff;
            --accent-pink: #ff007f;
            --gold: #f7d85c;
            --text-main: #f7d85c;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 20% 30%, #1a1f2e 0%, #0a0e13 70%);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 30px;
            border-radius: 0;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 50px rgba(0,0,0,0.3);
            position: relative;
            margin-bottom: 25px;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 10px; height: 10px;
            border-top: 2px solid var(--accent-blue);
            border-left: 2px solid var(--accent-blue);
        }

        h2 {
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.2rem;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(0, 210, 255, 0.2);
            padding-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-box {
            background: linear-gradient(180deg, #161d2b 0%, #0d121c 100%);
            border: 1px solid #253147;
            padding: 20px;
            text-align: center;
        }

        .stat-title { display: block; font-size: 0.8rem; color: #8899aa; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 1.8rem; display: block; color: white; text-shadow: 0 0 10px var(--accent-blue); }
        .stat-sub { font-size: 0.8rem; }

        /* Estilos de las listas limpias */
        .stat-box ul {
            list-style: none;
            padding: 0;
            margin: 10px auto;
            text-align: left;
            display: inline-block;
        }
        .stat-box li {
            padding: 2px 0;
            color: white;
            font-size: 0.85rem;
        }
