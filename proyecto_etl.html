<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Estadísticas T15 - Proyecto ETL</title>
   <style>
        :root {
    /* Paleta ajustada para máximo contraste */
    --card-bg: rgba(10, 14, 19, 0.85);
    --accent-blue: #00e1ff;
    --accent-pink: #ff007f;
    
    /* Dorado eléctrico (más saturado para contrastar con azul) */
    --gold: #ffcc00; 
    --gold-glow: #ff9900;
    --text-main: #ffffff; /* Blanco para texto general para mejor lectura */
}




        body {
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0e13;
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            overflow-x: hidden;
            /* Fondo de fuego azul */
            background: linear-gradient(0deg, #050a14, #001f3f, #00e1ff33);
            background-size: 100% 300%;
            animation: fireAnim 10s ease infinite;
        }

        @keyframes fireAnim {
            0% { background-position: 0% 100%; }
            50% { background-position: 0% 0%; }
            100% { background-position: 0% 100%; }
        }

        /* Contenedor principal */
        .container { max-width: 1100px; margin: 0 auto; z-index: 1; position: relative; }

        /* Tarjetas */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 225, 255, 0.3);
            padding: 30px;
            margin-bottom: 25px;
            backdrop-filter: blur(8px);
        }

        h2 { color: var(--accent-blue); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--accent-blue); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #1a2f47;
            padding: 20px;
            text-align: center;
        }

        /* Los títulos de las listas también en dorado para coherencia */
        .stat-title { 
            display: block; 
            font-size: 0.75rem; 
            color: var(--gold); /* Títulos en dorado para destacar */
            text-transform: uppercase; 
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .stat-value { font-size: 1.6rem; color: white; text-shadow: 0 0 10px var(--accent-blue); }

        ul { list-style: none; padding: 0; text-align: left; display: inline-block; }
        li { color: white; font-size: 0.8rem; margin: 3px 0; }
        li b { color: var(--accent-blue); }

        /* Aplicación del contraste en los elementos */
        .tech-tag {
            background: rgba(255, 204, 0, 0.1); /* Fondo muy sutil para resaltar el borde */
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 5px 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
            /* Resplandor suave para que resalte sobre el fondo oscuro/azul */
            text-shadow: 0 0 5px var(--gold-glow);
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
            display: inline-block;
        }
    </style>
    
</head>
<body>

    <div class="container">
        <div class="header-banner">
            <h1>PIPELINE ETL: T15</h1>
            <p>Infraestructura de datos de alto rendimiento</p>
        </div>

        <div class="card">
            <h2>Resultados de Análisis</h2>
            <div class="stats-grid">
                <div class="stat-box"><span class="stat-title">Partidas</span><span class="stat-value" id="total-partidas">--</span></div>
                <div class="stat-box"><span class="stat-title">Campeones</span><span class="stat-value" id="total-campeones">--</span></div>
                <div class="stat-box"><span class="stat-title">Duración Avg</span><span class="stat-value" id="duracion-media">--</span></div>
                <div class="stat-box"><span class="stat-title">Victorias</span><span class="stat-value" id="victorias-totales">--</span></div>
                <div class="stat-box">
                    <span class="stat-title">Top Campeón</span>
                    <span class="stat-value" id="top-champ">--</span>
                    <span class="stat-sub" id="top-champ-rate">--</span>
                </div>
                <div class="stat-box">
                    <span class="stat-title">Top Campeones</span>
                    <ul id="lista-campeones"></ul>
                </div>
                <div class="stat-box">
                    <span class="stat-title">Win Rate por Rol</span>
                    <ul id="lista-roles"></ul>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Tecnologías</h2>
            <span class="tech-tag">Python</span>
            <span class="tech-tag">Pandas</span>
            <span class="tech-tag">Flask</span>
            <span class="tech-tag">MySQL</span>
        </div>
    </div>

    <script>
        fetch('https://cterron074-github-io.onrender.com/api/stats')
            .then(res => res.json())
            .then(data => {
                // 1. Indicadores simples
                document.getElementById('total-partidas').innerText = data.general.total_games.toLocaleString();
                document.getElementById('total-campeones').innerText = data.general.total_champions;
                document.getElementById('duracion-media').innerText = data.general.avg_duration + " min";
                document.getElementById('victorias-totales').innerText = data.wins.total_wins.toLocaleString();
                document.getElementById('top-champ').innerText = data.best_champ.champion_name;
                document.getElementById('top-champ-rate').innerText = data.best_champ.win_rate + "% WR";

                // 2. Poblar Array Campeones
                const listaChamps = document.getElementById('lista-campeones');
                data.top_champions.forEach(c => {
                    const li = document.createElement('li');
                    li.innerHTML = `${c.champion_name}: <b>${c.games_played}</b>`;
                    listaChamps.appendChild(li);
                });

                // 3. Poblar Array Roles
                const listaRoles = document.getElementById('lista-roles');
                data.roles.forEach(r => {
                    const li = document.createElement('li');
                    li.innerHTML = `${r.position}: <b>${r.win_rate}%</b>`;
                    listaRoles.appendChild(li);
                });
            })
            .catch(err => console.error("Error cargando datos:", err));
    </script>
</body>
</html>
